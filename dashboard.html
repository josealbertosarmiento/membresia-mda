<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App MDA - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; padding-bottom: 80px; }
        .navbar-custom { background-color: #1a1a1a; border-bottom: 1px solid #2d2d2d; }
        .text-accent { color: #d9534f; }
        .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .miembro-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; margin-bottom: 10px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 40px; height: 40px; background-color: #2d2d2d; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }
        .fab-btn { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background-color: #d9534f; color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; border: none; z-index: 1000; box-shadow: 0 4px 15px rgba(217,83,79,0.4); }
        #pantallaCarga { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #121212; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { background-color: #1e1e1e; color: white; border: 1px solid #333; }
        .form-control, .form-select { background-color: #2b2b2b; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="pantallaCarga">
        <div class="spinner-border text-danger mb-3"></div>
        <h5 class="text-muted fw-light">Sincronizando...</h5>
    </div>

    <div id="appContent" class="d-none">
        <nav class="navbar navbar-dark navbar-custom px-3 py-3 sticky-top">
            <div class="container-fluid p-0">
                <span class="navbar-brand mb-0 h4 fw-bold">MDA <span class="text-accent" id="txtRolMenu">App</span></span>
                <button id="btnCerrarSesion" class="btn btn-outline-danger btn-sm rounded-pill">Salir</button>
            </div>
        </nav>

        <div class="container mt-4">
            <div class="card p-3 mb-4 shadow-sm border-0" style="background: linear-gradient(145deg, #1e1e1e, #181818); border-radius: 15px;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h6 class="text-muted fw-light mb-0" id="txtNombreUsuario">Mi Estado</h6>
                        <select id="selectorAnio" class="form-select form-select-sm mt-1 border-secondary" style="background-color: #2b2b2b; color: white; width: auto;">
                            <option value="2026" selected>Año 2026</option>
                            <option value="2025">Año 2025</option>
                            <option value="2024">Año 2024</option>
                        </select>
                    </div>
                    <div class="text-end">
                        <small class="text-muted d-block">Deuda Histórica</small>
                        <h4 class="text-danger fw-bold mb-0" id="miDeudaTotal">$0</h4>
                    </div>
                </div>
                <div class="row g-2 text-center" id="calendarioPagos">
                    </div>
                <div id="indicadorSuspension" class="alert alert-dark py-1 px-2 mt-3 mb-0 small text-center d-none" style="border: 1px dashed #d9534f; color: #d9534f;">
                    ⚠️ Membresía Congelada (Suspendido)
                </div>
            </div>

            <div id="seccionDirectorio" class="d-none">
                <div class="d-flex justify-content-between align-items-end mb-3">
                    <h2 class="fw-bold mb-0">Miembros</h2>
                    <button id="btnAbrirCobro" class="btn btn-success btn-sm d-none" data-bs-toggle="modal" data-bs-target="#modalCobro">Registrar Pago</button>
                </div>
                <div id="listaUsuarios"></div>
            </div>
        </div>

        <button id="btnFabNuevo" class="fab-btn d-none" data-bs-toggle="modal" data-bs-target="#modalNuevoMiembro">+</button>

        <div class="modal fade" id="modalNuevoMiembro" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header border-0"><h5 class="fw-bold">Nuevo Registro</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <form id="formNuevoMiembro">
                            <input type="text" id="nuevoNombre" class="form-control mb-3" placeholder="Nombre" required>
                            <input type="email" id="nuevoEmail" class="form-control mb-3" placeholder="Correo" required>
                            <div class="row">
                                <div class="col-6"><select id="nuevoRango" class="form-select mb-3"><option value="Rookie">Rookie</option><option value="Miembro">Miembro</option><option value="Fullmember">Fullmember</option><option value="Secretario">Secretario</option><option value="Tesorero">Tesorero</option><option value="Presidente">Presidente</option></select></div>
                                <div class="col-6"><select id="nuevoRol" class="form-select mb-3"><option value="ESTANDAR">Estandar</option><option value="TESORERO">Tesorero</option><option value="ADMIN">Admin</option></select></div>
                            </div>
                            <button type="submit" id="btnGuardarMiembro" class="btn btn-danger w-100 fw-bold py-2">Guardar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalCobro" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header border-0"><h5 class="fw-bold">Cobrar Membresía</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body text-center">
                        <p class="text-muted small">Registra los dólares recibidos en físico.</p>
                        <form id="formCobro">
                            <select id="cobroMiembro" class="form-select mb-3" required></select>
                            <div class="input-group mb-3">
                                <span class="input-group-text bg-dark text-success border-secondary">$</span>
                                <input type="number" id="montoCobro" class="form-control form-control-lg text-center" placeholder="0" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold py-3">Confirmar Pago</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEX-TTUzHwBzmfOqfG1R7C-0n5kVPGXh4",
            authDomain: "sistema-mda.firebaseapp.com",
            projectId: "sistema-mda",
            storageBucket: "sistema-mda.firebasestorage.app",
            messagingSenderId: "209728856018",
            appId: "1:209728856018:web:41f93f7c63b0e10a17720b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appSecundaria = initializeApp(firebaseConfig, "AppSecundaria");
        const authSecundaria = getAuth(appSecundaria);

        // 1. CONTROL DE ACCESO Y LECTURA DE PERFIL REAL
        onAuthStateChanged(auth, async (user) => {
            if (!user) { 
                window.location.href = "index.html"; 
            } else {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists()) {
                    const d = userDoc.data();
                    
                    // Mostramos nombre y deuda del campo real
                    document.getElementById('txtNombreUsuario').innerText = "Hola, " + d.nombre;
                    document.getElementById('miDeudaTotal').innerText = "$" + (d.deuda_heredada || 0);
                    document.getElementById('txtRolMenu').innerText = d.rol_app;

                    // LÓGICA DE SUSPENSIÓN: Si el campo es "SUSPENDIDO", mostramos el letrero
                    const indicador = document.getElementById('indicadorSuspension');
                    if(d.estado_membresia === "SUSPENDIDO") {
                        indicador.classList.remove('d-none');
                    } else {
                        indicador.classList.add('d-none');
                    }

                    // LLAMADA AL CALENDARIO REAL
                    // Le pasamos el estado y los meses que tenga pagados (si no tiene, enviamos array vacío)
                    generarCalendarioReal(d.estado_membresia, d.meses_pagados_2026 || []);

                    // Permisos de interfaz
                    if (d.rol_app === "ADMIN" || d.rol_app === "TESORERO") {
                        document.getElementById('seccionDirectorio').classList.remove('d-none');
                        document.getElementById('btnAbrirCobro').classList.remove('d-none');
                        if(d.rol_app === "ADMIN") document.getElementById('btnFabNuevo').classList.remove('d-none');
                        cargarUsuarios();
                    }

                    document.getElementById('pantallaCarga').classList.add('d-none');
                    document.getElementById('appContent').classList.remove('d-none');
                }
            }
        });

        // 2. FUNCIÓN DEL CALENDARIO CORREGIDA
        function generarCalendarioReal(estado, mesesPagados) {
            const nombresMeses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            const contenedor = document.getElementById('calendarioPagos');
            const mesActual = new Date().getMonth(); // 0 = Enero, 1 = Feb, 2 = Marzo...
            
            contenedor.innerHTML = "";

            nombresMeses.forEach((nombre, index) => {
                let claseColor = "bg-secondary text-muted"; // Color por defecto (Gris/Futuro)
                let estiloExtra = "";

                // REGLA 1: ¿Está pagado? (Verde)
                if (mesesPagados.includes(index + 1)) {
                    claseColor = "bg-success text-white shadow-sm";
                } 
                // REGLA 2: ¿Es un mes que ya pasó o es el actual?
                else if (index <= mesActual) {
                    // Si está SUSPENDIDO, no se pone rojo, se tacha (Gris oscuro)
                    if (estado === "SUSPENDIDO") {
                        claseColor = "bg-dark text-muted";
                        estiloExtra = "text-decoration: line-through; opacity: 0.5;";
                    } else {
                        // Si está ACTIVO y no está pagado, se pone Rojo
                        claseColor = "bg-danger text-white shadow-sm";
                    }
                }

                contenedor.innerHTML += `
                    <div class="col-3">
                        <div class="p-2 rounded small fw-bold ${claseColor}" style="${estiloExtra}">
                            ${nombre}
                        </div>
                    </div>`;
            });
        }

        async function cargarUsuarios() {
            const lista = document.getElementById('listaUsuarios');
            const selectCobro = document.getElementById('cobroMiembro');
            const snap = await getDocs(collection(db, "usuarios"));
            lista.innerHTML = "";
            selectCobro.innerHTML = '<option value="">Seleccionar Miembro...</option>';
            
            snap.forEach((doc) => {
                const u = doc.data();
                const inicial = u.nombre.charAt(0).toUpperCase();
                lista.innerHTML += `
                    <div class="miembro-card">
                        <div class="d-flex align-items-center">
                            <div class="avatar">${inicial}</div>
                            <div><h6 class="mb-0 fw-bold">${u.nombre}</h6><small class="text-muted">${u.rango_mg}</small></div>
                        </div>
                        <span class="badge ${u.rol_app === 'ADMIN' ? 'bg-danger' : 'bg-secondary'} rounded-pill small">${u.rol_app}</span>
                    </div>`;
                // Llenar select del tesorero
                selectCobro.innerHTML += `<option value="${doc.id}">${u.nombre}</option>`;
            });
        }

        // Lógica de Registro de Usuario... (se mantiene igual que antes)
        document.getElementById('formNuevoMiembro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardarMiembro');
            btn.innerText = "Registrando..."; btn.disabled = true;
            try {
                const userCred = await createUserWithEmailAndPassword(authSecundaria, document.getElementById('nuevoEmail').value, "mda123456");
                await setDoc(doc(db, "usuarios", userCred.user.uid), {
                    nombre: document.getElementById('nuevoNombre').value,
                    email: document.getElementById('nuevoEmail').value,
                    rango_mg: document.getElementById('nuevoRango').value,
                    rol_app: document.getElementById('nuevoRol').value,
                    deuda_heredada: 0,
                    estado_membresia: "ACTIVO",
                    estado: "Activo"
                });
                await signOut(authSecundaria);
                document.getElementById('formNuevoMiembro').reset();
                bootstrap.Modal.getInstance(document.getElementById('modalNuevoMiembro')).hide();
                cargarUsuarios();
            } catch (error) { alert(error.message); }
            finally { btn.innerText = "Guardar"; btn.disabled = false; }
        });

        document.getElementById('btnCerrarSesion').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        });
    </script>
</body>
</html>
