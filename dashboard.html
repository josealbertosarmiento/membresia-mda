<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDA App - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="pantallaCarga">
        <div class="spinner-border text-danger mb-3"></div>
        <h5>Sincronizando...</h5>
    </div>

    <div id="appContent" class="d-none">
        <nav class="navbar navbar-dark navbar-custom px-3 py-3 sticky-top">
            <span class="navbar-brand mb-0 h4 fw-bold">MDA <span class="text-accent" id="txtRolMenu">App</span></span>
            <button id="btnCerrarSesion" class="btn btn-outline-danger btn-sm rounded-pill">Salir</button>
        </nav>

        <div id="vistaPersonal" class="container mt-4">
            <div class="card p-3 mb-4 card-custom">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h6 id="txtNombreUsuario" class="mb-0">Cargando...</h6>
                        <select id="selectorAnio" class="form-select form-select-sm mt-1 bg-dark text-white border-secondary">
                            <option value="2026" selected>Año 2026</option>
                            <option value="2025">Año 2025</option>
                        </select>
                    </div>
                    <div class="text-end">
                        <small>Mi Deuda</small>
                        <h4 class="text-danger fw-bold mb-0" id="miDeudaTotal">$0</h4>
                    </div>
                </div>
                <div id="calendarioPagos" class="row g-2 text-center"></div>
                <div id="indicadorSuspension" class="alert alert-dark py-2 mt-3 small text-center d-none" style="border: 1px dashed red; color: red;"></div>
            </div>
        </div>

        <div id="vistaGestion" class="container mt-4 d-none">
            <div id="balanceGlobal" class="card bg-dark border-secondary p-3 mb-4 text-center">
                <div class="row">
                    <div class="col-6 border-end border-secondary">
                        <small class="text-muted">En Caja</small>
                        <h5 class="text-success fw-bold" id="totalEnCaja">$0</h5>
                    </div>
                    <div class="col-6">
                        <small class="text-muted">Por Cobrar</small>
                        <h5 class="text-warning fw-bold" id="totalPorCobrar">$0</h5>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="fw-bold mb-0">Miembros</h2>
                <div id="btnsTesorero" class="d-none">
                    <button class="btn btn-outline-success btn-sm me-2" data-bs-toggle="modal" data-bs-target="#modalCajaInicial">Caja Inicial</button>
                    <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalCobroReal">Cobrar</button>
                </div>
            </div>
            <div id="listaUsuarios"></div>
        </div>

        <div id="vistaSecretario" class="container mt-4 d-none">
            <h2 class="fw-bold mb-3">Fichas</h2>
            <div id="listaFichas"></div>
        </div>

        <button id="btnNuevoRegistro" class="fab-btn d-none" data-bs-toggle="modal" data-bs-target="#modalRegistroPro">+</button>

        <div id="navAdmin" class="nav-admin d-none">
            <button id="btnNavPers" class="nav-item active"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Perfil</span></button>
            <button id="btnNavGest" class="nav-item"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4V6h16v12zm-10-7h8v2h-8z"/></svg><span>Caja</span></button>
            <button id="btnNavSecre" class="nav-item d-none"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg><span>Fichas</span></button>
        </div>
    </div>

    <div class="modal fade" id="modalCajaInicial" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary"><h5 class="fw-bold">Saldo Inicial Fondo MG</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="formCajaInicial">
                        <input type="number" id="montoCajaInicial" class="form-control mb-3" placeholder="Ej: 200" required>
                        <button type="submit" class="btn btn-success w-100 fw-bold">GUARDAR FONDO</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
