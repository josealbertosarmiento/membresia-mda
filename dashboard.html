<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDA App - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="pantallaCarga">
        <div class="spinner-border text-danger mb-3"></div>
        <h5>Sincronizando...</h5>
    </div>

    <div id="appContent" class="d-none">
        <nav class="navbar navbar-dark navbar-custom px-3 py-3 sticky-top">
            <span class="navbar-brand mb-0 h4 fw-bold">MDA <span class="text-accent" id="txtRolMenu">App</span></span>
            <button id="btnCerrarSesion" class="btn btn-outline-danger btn-sm rounded-pill">Salir</button>
        </nav>

        <div id="vistaPersonal" class="container mt-4">
            <div class="card p-3 mb-4 card-custom">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h6 id="txtNombreUsuario" class="mb-0">Cargando...</h6>
                        <select id="selectorAnio" class="form-select form-select-sm mt-1 bg-dark text-white border-secondary">
                            <option value="2026" selected>Año 2026</option>
                            <option value="2025">Año 2025</option>
                            <option value="2024">Año 2024</option>
                        </select>
                    </div>
                    <div class="text-end">
                        <small>Deuda</small>
                        <h4 class="text-danger fw-bold mb-0" id="miDeudaTotal">$0</h4>
                    </div>
                </div>
                <div class="row g-2 text-center" id="calendarioPagos"></div>
                <div id="indicadorSuspension" class="alert alert-dark py-2 mt-3 small text-center d-none" style="border: 1px dashed red; color: red;"></div>
            </div>
        </div>

        <div id="vistaGestion" class="container mt-4 d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="fw-bold mb-0">Gestión</h2>
                <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalCobroReal">Registrar Pago</button>
            </div>
            <div id="listaUsuarios"></div>
        </div>

        <button id="btnNuevoRegistro" class="fab-btn d-none" data-bs-toggle="modal" data-bs-target="#modalRegistroPro">+</button>

        <div id="navAdmin" class="nav-admin d-none">
            <button id="btnNavPers" class="nav-item active"><i>👤</i><span>Mi Estado</span></button>
            <button id="btnNavGest" class="nav-item"><i>💰</i><span>Gestión</span></button>
        </div>
    </div>

    <div class="modal fade" id="modalRegistroPro" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0"><h5 class="fw-bold">Nuevo Miembro</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="formNuevoMiembro">
                        <input type="text" id="nuevoNombre" class="form-control mb-3" placeholder="Nombre Completo" required>
                        <input type="email" id="nuevoEmail" class="form-control mb-3" placeholder="Correo" required>
                        <input type="password" id="nuevoPass" class="form-control mb-3" placeholder="Clave temporal" required>
                        <div class="row">
                            <div class="col-6"><select id="nuevoRango" class="form-select mb-3"><option value="Rookie">Rookie</option><option value="Miembro">Miembro</option><option value="Tesorero">Tesorero</option></select></div>
                            <div class="col-6"><select id="nuevoRol" class="form-select mb-3"><option value="ESTANDAR">Estandar</option><option value="ADMIN">Admin</option></select></div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCobroReal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0"><h5 class="fw-bold text-success">Registrar Pago</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="formRegistrarPago">
                        <select id="selectCobroMiembro" class="form-select mb-3" required></select>
                        <input type="number" id="montoPago" class="form-control mb-3" placeholder="Monto $" required>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Confirmar Pago</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
