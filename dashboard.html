<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App MDA - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; padding-bottom: 80px; }
        .navbar-custom { background-color: #1a1a1a; border-bottom: 1px solid #2d2d2d; }
        .text-accent { color: #d9534f; }
        .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .miembro-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; margin-bottom: 10px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 40px; height: 40px; background-color: #2d2d2d; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }
        .fab-btn { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background-color: #d9534f; color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; border: none; z-index: 1000; box-shadow: 0 4px 15px rgba(217,83,79,0.4); }
        #pantallaCarga { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #121212; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { background-color: #1e1e1e; color: white; border: 1px solid #333; }
        .form-control, .form-select { background-color: #2b2b2b; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="pantallaCarga">
        <div class="spinner-border text-danger mb-3"></div>
        <h5 class="text-muted fw-light">Sincronizando...</h5>
    </div>

    <div id="appContent" class="d-none">
        <nav class="navbar navbar-dark navbar-custom px-3 py-3 sticky-top">
            <div class="container-fluid p-0">
                <span class="navbar-brand mb-0 h4 fw-bold">MDA <span class="text-accent" id="txtRolMenu">App</span></span>
                <button id="btnCerrarSesion" class="btn btn-outline-danger btn-sm rounded-pill px-3">Salir</button>
            </div>
        </nav>

        <div class="container mt-4">
            <div class="card p-3 mb-4 shadow-sm border-0 card-custom">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h6 class="text-white fw-light mb-0" id="txtNombreUsuario">Mi Estado</h6>
                        <select id="selectorAnio" class="form-select form-select-sm mt-1" style="background-color: #2b2b2b; color: white; width: auto;">
                            <option value="2026" selected>Año 2026</option>
                            <option value="2025">Año 2025</option>
                            <option value="2024">Año 2024</option>
                        </select>
                    </div>
                    <div class="text-end">
                        <small class="text-white d-block">Deuda Histórica</small>
                        <h4 class="text-danger fw-bold mb-0" id="miDeudaTotal">$0</h4>
                    </div>
                </div>
                <div class="row g-2 text-center" id="calendarioPagos"></div>
                <div id="indicadorSuspension" class="alert alert-dark py-1 px-2 mt-3 mb-0 small text-center d-none" style="border: 1px dashed #d9534f; color: #d9534f;">
                    ⚠️ Membresía Congelada
                </div>
            </div>

            <div id="seccionDirectorio" class="d-none">
                <h2 class="fw-bold mb-3">Miembros</h2>
                <div id="listaUsuarios"></div>
            </div>
        </div>

        <button id="btnFabNuevo" class="fab-btn d-none" data-bs-toggle="modal" data-bs-target="#modalEditarMiembro">+</button>

        <div class="modal fade" id="modalEditarMiembro" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header border-0"><h5 class="fw-bold">Actualizar Datos</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <form id="formEditarMiembro">
                            <input type="hidden" id="editUid">
                            <div class="mb-3"><label class="small text-muted">Monto de Deuda ($)</label><input type="number" id="editDeuda" class="form-control" required></div>
                            <div class="mb-3">
                                <label class="small text-muted">Estado Membresía</label>
                                <select id="editEstado" class="form-select">
                                    <option value="ACTIVO">ACTIVO</option>
                                    <option value="SUSPENDIDO">SUSPENDIDO</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Guardar Cambios</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEX-TTUzHwBzmfOqfG1R7C-0n5kVPGXh4",
            authDomain: "sistema-mda.firebaseapp.com",
            projectId: "sistema-mda",
            storageBucket: "sistema-mda.firebasestorage.app",
            messagingSenderId: "209728856018",
            appId: "1:209728856018:web:41f93f7c63b0e10a17720b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Variables globales para el selector de año
        let deudaFinalGlobal = 0;
        let estadoGlobal = "ACTIVO";

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; } 
            
            try {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists()) {
                    const d = userDoc.data();
                    
                    // Lógica de Deuda Automática
                    let deudaBase = Number(d.deuda_total) || 0;
                    const hoy = new Date();
                    const mesCarga = 2; // Marzo
                    const anioCarga = 2026;
                    let mesesTranscurridos = ((hoy.getFullYear() - anioCarga) * 12) + (hoy.getMonth() - mesCarga);
                    if (mesesTranscurridos < 0) mesesTranscurridos = 0;

                    let multiplicador = (d.estado_membresia === "SUSPENDIDO") ? 0 : 5;
                    deudaFinalGlobal = deudaBase + (mesesTranscurridos * multiplicador);
                    estadoGlobal = d.estado_membresia || "ACTIVO";

                    // Interfaz
                    document.getElementById('txtNombreUsuario').innerText = "Hola, " + d.nombre;
                    document.getElementById('miDeudaTotal').innerText = "$" + deudaFinalGlobal;
                    document.getElementById('txtRolMenu').innerText = d.rol_app || "MIEMBRO";

                    if(estadoGlobal === "SUSPENDIDO") document.getElementById('indicadorSuspension').classList.remove('d-none');
                    else document.getElementById('indicadorSuspension').classList.add('d-none');

                    generarCalendario(deudaFinalGlobal, estadoGlobal, "2026");

                    // Mostrar secciones si es ADMIN
                    if (d.rol_app === "ADMIN") {
                        document.getElementById('seccionDirectorio').classList.remove('d-none');
                        document.getElementById('btnFabNuevo').classList.remove('d-none');
                        cargarUsuarios();
                    }

                    // IMPORTANTE: Quitamos carga
                    document.getElementById('pantallaCarga').classList.add('d-none');
                    document.getElementById('appContent').classList.remove('d-none');
                } else {
                    alert("No se encontró perfil de usuario.");
                }
            } catch (e) {
                console.error(e);
                document.getElementById('pantallaCarga').classList.add('d-none');
            }
        });

        // Selector de año funcional
        document.getElementById('selectorAnio').addEventListener('change', (e) => {
            generarCalendario(deudaFinalGlobal, estadoGlobal, e.target.value);
        });

        function generarCalendario(deudaDolares, estado, anioVer) {
            const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            const contenedor = document.getElementById('calendarioPagos');
            const hoy = new Date();
            const diaHoy = hoy.getDate();
            const mesHoy = hoy.getMonth();
            const anioHoy = hoy.getFullYear();
            
            let mesesADeber = Math.floor(deudaDolares / 5);
            contenedor.innerHTML = "";

            meses.forEach((nombre, i) => {
                let color = "bg-secondary text-muted";
                let estilo = "";

                if (parseInt(anioVer) < anioHoy || (parseInt(anioVer) === anioHoy && i <= mesHoy)) {
                    let esMesActualYGracia = (parseInt(anioVer) === anioHoy && i === mesHoy && diaHoy <= 5);
                    if (esMesActualYGracia) {
                        color = "bg-secondary text-muted";
                    } else {
                        let diff = ((anioHoy - parseInt(anioVer)) * 12) + (mesHoy - i);
                        if (diff < mesesADeber) {
                            if (estado === "SUSPENDIDO") {
                                color = "bg-dark text-muted";
                                estilo = "text-decoration: line-through; opacity: 0.5;";
                            } else { color = "bg-danger text-white"; }
                        } else { color = "bg-success text-white"; }
                    }
                }
                contenedor.innerHTML += `<div class="col-3"><div class="p-2 rounded small fw-bold ${color}" style="${estilo}">${nombre}</div></div>`;
            });
        }

        async function cargarUsuarios() {
            const lista = document.getElementById('listaUsuarios');
            const snap = await getDocs(collection(db, "usuarios"));
            lista.innerHTML = "";
            snap.forEach((d) => {
                const u = d.data();
                lista.innerHTML += `
                    <div class="miembro-card">
                        <div class="d-flex align-items-center">
                            <div class="avatar">${u.nombre.charAt(0).toUpperCase()}</div>
                            <div><h6 class="mb-0 fw-bold">${u.nombre}</h6><small class="text-muted">$${u.deuda_total || 0} - ${u.estado_membresia}</small></div>
                        </div>
                        <button class="btn btn-sm btn-outline-light" onclick="window.abrirEditor('${d.id}', ${u.deuda_total || 0}, '${u.estado_membresia}')">Editar</button>
                    </div>`;
            });
        }

        window.abrirEditor = (uid, deuda, estado) => {
            document.getElementById('editUid').value = uid;
            document.getElementById('editDeuda').value = deuda;
            document.getElementById('editEstado').value = estado;
            new bootstrap.Modal(document.getElementById('modalEditarMiembro')).show();
        };

        document.getElementById('formEditarMiembro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const uid = document.getElementById('editUid').value;
            await updateDoc(doc(db, "usuarios", uid), {
                deuda_total: Number(document.getElementById('editDeuda').value),
                estado_membresia: document.getElementById('editEstado').value
            });
            location.reload();
        });

        document.getElementById('btnCerrarSesion').onclick = () => signOut(auth).then(() => location.href = "index.html");
    </script>
</body>
</html>
