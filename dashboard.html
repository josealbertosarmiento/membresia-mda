<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App MDA - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; padding-bottom: 80px; }
        .navbar-custom { background-color: #1a1a1a; border-bottom: 1px solid #2d2d2d; }
        .text-accent { color: #d9534f; }
        .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .miembro-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; margin-bottom: 10px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 40px; height: 40px; background-color: #2d2d2d; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }
        .fab-btn { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background-color: #d9534f; color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; border: none; z-index: 1000; box-shadow: 0 4px 15px rgba(217,83,79,0.4); }
        #pantallaCarga { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #121212; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { background-color: #1e1e1e; color: white; border: 1px solid #333; }
        .form-control, .form-select { background-color: #2b2b2b; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="pantallaCarga">
        <div class="spinner-border text-danger mb-3"></div>
        <h5 class="text-muted fw-light">Sincronizando...</h5>
    </div>

    <div id="appContent" class="d-none">
        <nav class="navbar navbar-dark navbar-custom px-3 py-3 sticky-top">
            <div class="container-fluid p-0">
                <span class="navbar-brand mb-0 h4 fw-bold">MDA <span class="text-accent" id="txtRolMenu">App</span></span>
                <button id="btnCerrarSesion" class="btn btn-outline-danger btn-sm rounded-pill px-3">Salir</button>
            </div>
        </nav>

        <div class="container mt-4">
            <div class="card p-3 mb-4 shadow-sm border-0 card-custom">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h6 class="text-white fw-light mb-0" id="txtNombreUsuario">Mi Estado</h6>
                        <select id="selectorAnio" class="form-select form-select-sm mt-1" style="background-color: #2b2b2b; color: white; width: auto;">
                            <option value="2026" selected>Año 2026</option>
                            <option value="2025">Año 2025</option>
                            <option value="2024">Año 2024</option>
                        </select>
                    </div>
                    <div class="text-end">
                        <small class="text-white d-block">Deuda Histórica</small>
                        <h4 class="text-danger fw-bold mb-0" id="miDeudaTotal">$0</h4>
                    </div>
                </div>
                <div class="row g-2 text-center" id="calendarioPagos"></div>
                <div id="indicadorSuspension" class="alert alert-dark py-1 px-2 mt-3 mb-0 small text-center d-none" style="border: 1px dashed #d9534f; color: #d9534f;">
                    ⚠️ Membresía Congelada
                </div>
            </div>

            <div id="seccionDirectorio" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="fw-bold mb-0">Miembros</h2>
                    <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalCobroReal">Registrar Pago</button>
                </div>
                <div id="listaUsuarios"></div>
            </div>
        </div>

        <button id="btnNuevoRegistro" class="fab-btn d-none" data-bs-toggle="modal" data-bs-target="#modalRegistroPro">+</button>

        <div class="modal fade" id="modalRegistroPro" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header border-0 pb-0"><h5 class="fw-bold">Nuevo Registro MG</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <form id="formNuevoMiembro">
                            <input type="text" id="nuevoNombre" class="form-control mb-3" placeholder="Nombre Completo" required>
                            <input type="email" id="nuevoEmail" class="form-control mb-3" placeholder="Correo" required>
                            <input type="password" id="nuevoPass" class="form-control mb-3" placeholder="Clave temporal" required>
                            <div class="row">
                                <div class="col-6"><select id="nuevoRango" class="form-select mb-3"><option value="Rookie">Rookie</option><option value="Miembro">Miembro</option><option value="Tesorero">Tesorero</option><option value="Presidente">Presidente</option></select></div>
                                <div class="col-6"><select id="nuevoRol" class="form-select mb-3"><option value="ESTANDAR">Estandar</option><option value="ADMIN">Admin</option></select></div>
                            </div>
                            <button type="submit" id="btnGuardarMiembro" class="btn btn-danger w-100 fw-bold py-2">Guardar Miembro</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalCobroReal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header border-0 pb-0"><h5 class="fw-bold text-success">Registrar Pago</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <form id="formRegistrarPago">
                            <select id="selectCobroMiembro" class="form-select mb-3" required></select>
                            <div class="input-group mb-4">
                                <span class="input-group-text bg-dark border-secondary text-success">$</span>
                                <input type="number" id="montoPago" class="form-control form-control-lg text-center fw-bold" placeholder="0.00" required>
                            </div>
                            <button type="submit" id="btnConfirmarPago" class="btn btn-success w-100 fw-bold py-3">Confirmar y Activar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEX-TTUzHwBzmfOqfG1R7C-0n5kVPGXh4",
            authDomain: "sistema-mda.firebaseapp.com",
            projectId: "sistema-mda",
            storageBucket: "sistema-mda.firebasestorage.app",
            messagingSenderId: "209728856018",
            appId: "1:209728856018:web:41f93f7c63b0e10a17720b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appSecundaria = initializeApp(firebaseConfig, "Secondary");
        const authSecundaria = getAuth(appSecundaria);

        let deudaFinalGlobal = 0;
        let estadoGlobal = "ACTIVO";

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; } 
            
            try {
                const userRef = doc(db, "usuarios", user.uid);
                const userDoc = await getDoc(userRef);

                if (userDoc.exists()) {
                    const d = userDoc.data();
                    let deudaBase = Number(d.deuda_total) || 0;
                    const hoy = new Date();
                    const fechaAnclaje = d.fecha_anclaje ? new Date(d.fecha_anclaje + "T00:00:00") : new Date(2026, 2, 1);

                    let mesesNuevos = ((hoy.getFullYear() - fechaAnclaje.getFullYear()) * 12) + (hoy.getMonth() - fechaAnclaje.getMonth());
                    if (hoy.getDate() <= 5 && mesesNuevos > 0) mesesNuevos--;
                    if (mesesNuevos < 0) mesesNuevos = 0;

                    let deudaCalculada = deudaBase + (mesesNuevos * (d.estado_membresia === "SUSPENDIDO" ? 0 : 5));
                    let nuevoEstado = d.estado_membresia;
                    if (deudaCalculada >= 20) { deudaCalculada = 20; nuevoEstado = "SUSPENDIDO"; }

                    if (mesesNuevos > 0 || nuevoEstado !== d.estado_membresia) {
                        await updateDoc(userRef, { deuda_total: deudaCalculada, estado_membresia: nuevoEstado, fecha_anclaje: hoy.toISOString().split('T')[0] });
                    }

                    deudaFinalGlobal = deudaCalculada;
                    estadoGlobal = nuevoEstado;

                    document.getElementById('txtNombreUsuario').innerText = "Hola, " + d.nombre;
                    document.getElementById('miDeudaTotal').innerText = "$" + deudaFinalGlobal;
                    document.getElementById('txtRolMenu').innerText = d.rol_app || "MIEMBRO";

                    const ind = document.getElementById('indicadorSuspension');
                    if(estadoGlobal === "SUSPENDIDO") {
                        ind.innerText = "⚠️ SUSPENSIÓN: Prohibido uso de colores.";
                        ind.classList.remove('d-none');
                    } else { ind.classList.add('d-none'); }

                    generarCalendario(deudaFinalGlobal, estadoGlobal, "2026");

                    // REVISIÓN DE PERMISOS: Asegúrate que rol_app sea "ADMIN"
                    if (d.rol_app === "ADMIN") {
                        document.getElementById('seccionDirectorio').classList.remove('d-none');
                        document.getElementById('btnNuevoRegistro').classList.remove('d-none');
                        cargarUsuarios();
                        prepararSelectCobro();
                    }
                }
            } catch (e) { console.error(e); }
            finally {
                document.getElementById('pantallaCarga').classList.add('d-none');
                document.getElementById('appContent').classList.remove('d-none');
            }
        });

        function generarCalendario(deuda, estado, anio) {
            const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            const cont = document.getElementById('calendarioPagos');
            const hoy = new Date();
            let mesesDeudaReal = Math.floor(deuda / 5);
            cont.innerHTML = "";

            meses.forEach((nombre, i) => {
                let color = "bg-secondary text-muted";
                let estilo = "";
                if (parseInt(anio) < hoy.getFullYear() || (parseInt(anio) === hoy.getFullYear() && i <= hoy.getMonth())) {
                    let diff = ((hoy.getFullYear() - parseInt(anio)) * 12) + (hoy.getMonth() - i);
                    if (diff < mesesDeudaReal) { color = "bg-danger text-white"; }
                    else if (estado === "SUSPENDIDO" && diff >= mesesDeudaReal) { color = "bg-dark text-muted"; estilo="opacity: 0.6;"; nombre += " (X)"; }
                    else { color = "bg-success text-white"; }
                }
                cont.innerHTML += `<div class="col-3"><div class="p-2 rounded small fw-bold ${color}" style="${estilo}">${nombre}</div></div>`;
            });
        }

        async function cargarUsuarios() {
            const lista = document.getElementById('listaUsuarios');
            const snap = await getDocs(collection(db, "usuarios"));
            lista.innerHTML = "";
            snap.forEach((d) => {
                const u = d.data();
                lista.innerHTML += `
                    <div class="miembro-card">
                        <div class="d-flex align-items-center">
                            <div class="avatar">${u.nombre.charAt(0).toUpperCase()}</div>
                            <div><h6 class="mb-0 fw-bold">${u.nombre}</h6><small class="text-muted">$${u.deuda_total} - ${u.estado_membresia}</small></div>
                        </div>
                    </div>`;
            });
        }

        async function prepararSelectCobro() {
            const select = document.getElementById('selectCobroMiembro');
            const snap = await getDocs(collection(db, "usuarios"));
            select.innerHTML = '<option value="">Seleccione Miembro...</option>';
            snap.forEach(d => { select.innerHTML += `<option value="${d.id}">${d.data().nombre}</option>`; });
        }

        document.getElementById('formRegistrarPago').addEventListener('submit', async (e) => {
            e.preventDefault();
            const uid = document.getElementById('selectCobroMiembro').value;
            const monto = Number(document.getElementById('montoPago').value);
            const ref = doc(db, "usuarios", uid);
            const d = (await getDoc(ref)).data();
            let nueva = (d.deuda_total || 0) - monto;
            if (nueva < 0) nueva = 0;
            await updateDoc(ref, { deuda_total: nueva, estado_membresia: nueva >= 20 ? "SUSPENDIDO" : "ACTIVO", fecha_anclaje: new Date().toISOString().split('T')[0] });
            location.reload();
        });

        document.getElementById('formNuevoMiembro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('nuevoEmail').value;
            const pass = document.getElementById('nuevoPass').value;
            const u = await createUserWithEmailAndPassword(authSecundaria, email, pass);
            await setDoc(doc(db, "usuarios", u.user.uid), {
                nombre: document.getElementById('nuevoNombre').value,
                email: email,
                rango_mg: document.getElementById('nuevoRango').value,
                rol_app: document.getElementById('nuevoRol').value,
                deuda_total: 0,
                estado_membresia: "ACTIVO",
                fecha_anclaje: new Date().toISOString().split('T')[0]
            });
            await signOut(authSecundaria);
            location.reload();
        });

        document.getElementById('btnCerrarSesion').onclick = () => signOut(auth).then(() => location.href = "index.html");
    </script>
</body>
</html>
