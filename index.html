<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d9534f">
    <title>MDA - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; background-color: #121212; overflow: hidden; }
        .login-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?q=80&w=1000'); background-size: cover; background-position: center; z-index: -1; }
        .login-card { background: rgba(30, 30, 30, 0.9); border: 1px solid #444; border-radius: 20px; padding: 35px; backdrop-filter: blur(10px); width: 100%; max-width: 360px; text-align: center; }
        .brand-logo { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #d9534f; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; font-weight: bold; color: white; }
        .form-control { background: #2b2b2b; border: 1px solid #555; color: white; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .form-control::placeholder { color: #aaa !important; }
        .btn-mda { background: #d9534f; color: white; border: none; border-radius: 12px; padding: 12px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-bg"></div>
    <div class="login-card">
        <div class="brand-logo">MDA</div>
        <h4 class="text-white">Marihuaneros del Asfalto</h4>
        <p class="text-white-50 small mb-4">Membresía Digital MG</p>
        <form id="formLogin">
            <input type="email" id="email" class="form-control" placeholder="Correo electrónico" required>
            <input type="password" id="pass" class="form-control" placeholder="Contraseña" required>
            <button type="submit" id="btnLogin" class="btn-mda">ENTRAR</button>
        </form>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
