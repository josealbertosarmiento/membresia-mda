<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d9534f">
    <title>MDA - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?q=80&w=1000');
            background-size: cover; background-position: center; margin: 0;
        }
        .login-card {
            background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(10px);
            border-radius: 25px; border: 1px solid #444; width: 100%; max-width: 350px; padding: 2rem;
        }
        .form-control { background: #2b2b2b; border: 1px solid #444; color: white; border-radius: 12px; padding: 12px; }
        .form-control:focus { background: #333; border-color: #d9534f; color: white; box-shadow: none; }
        .btn-mda { background: #d9534f; color: white; border: none; border-radius: 12px; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div style="font-size: 40px; font-weight: bold; color: white; margin-bottom: 10px;">MDA</div>
        <p class="text-white-50 small mb-4">Marihuaneros del Asfalto MG</p>
        <form id="formLogin">
            <input type="email" id="email" class="form-control mb-3" placeholder="Correo" required>
            <input type="password" id="pass" class="form-control mb-4" placeholder="Contraseña" required>
            <button type="submit" id="btnLogin" class="btn btn-mda w-100">ENTRAR</button>
        </form>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCEX-TTUzHwBzmfOqfG1R7C-0n5kVPGXh4",
            authDomain: "sistema-mda.firebaseapp.com",
            projectId: "sistema-mda",
            storageBucket: "sistema-mda.firebasestorage.app",
            messagingSenderId: "209728856018",
            appId: "1:209728856018:web:41f93f7c63b0e10a17720b"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('formLogin').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.innerText = "Entrando..."; btn.disabled = true;
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value)
                .then(() => window.location.href = "dashboard.html")
                .catch(() => { alert("Error de acceso"); btn.innerText = "ENTRAR"; btn.disabled = false; });
        });
    </script>
</body>
</html>
