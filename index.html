<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema MDA - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212; /* Fondo oscuro */
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        .btn-custom {
            background-color: #d9534f; /* Rojo estilo motorizado, puedes cambiarlo */
            color: white;
            border: none;
        }
        .btn-custom:hover {
            background-color: #c9302c;
            color: white;
        }
        .form-control {
            background-color: #2b2b2b;
            color: white;
            border: 1px solid #444;
        }
        .form-control:focus {
            background-color: #333;
            color: white;
            border-color: #d9534f;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center px-3">
        <div class="login-card text-center">
            
            <img src="logomda.png" alt="Logo MDA" class="border-secondary">
            
            <h3 class="fw-bold mb-0">Finanzas Marihuaneros del Asfslto MG</h3>
            <p class="text-white small mb-4">Control de Membresías</p>

            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label for="email" class="form-label small text-white">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" required placeholder="miembro@mda.com">
                </div>
                <div class="mb-4 text-start">
                    <label for="password" class="form-label small text-white">Contraseña</label>
                    <input type="password" class="form-control" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-custom w-100 fw-bold py-2">Ingresar al Sistema</button>
            </form>
            
            <div id="errorMessage" class="alert alert-danger mt-3 d-none small py-2" role="alert"></div>
        </div>
    </div>

    <script type="module">
        // 1. Importar las funciones de inicialización, autenticación y base de datos
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // 2. Tu configuración exacta de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCEX-TTUzHwBzmfOqfG1R7C-0n5kVPGXh4",
            authDomain: "sistema-mda.firebaseapp.com",
            projectId: "sistema-mda",
            storageBucket: "sistema-mda.firebasestorage.app",
            messagingSenderId: "209728856018",
            appId: "1:209728856018:web:41f93f7c63b0e10a17720b",
            measurementId: "G-476LPDM8HC"
        };

        // 3. Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app); // Listo para usar en la siguiente pantalla

        // 4. Lógica de inicio de sesión
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Evita que la página parpadee al enviar el formulario
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Mostrar estado de carga (opcional, para mejor experiencia)
            const btnSubmit = loginForm.querySelector('button');
            btnSubmit.innerText = "Verificando...";

            // Consultar a Firebase
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Login exitoso
                    console.log("Bienvenido:", userCredential.user.email);
                    
                    // Aquí redirigimos al usuario al panel principal
                    window.location.href = "dashboard.html"; 
                })
                .catch((error) => {
                    // Si el correo o clave son incorrectos
                    btnSubmit.innerText = "Ingresar al Sistema";
                    errorMessage.classList.remove('d-none');
                    
                    if(error.code === 'auth/invalid-credential') {
                        errorMessage.innerText = "Correo o contraseña incorrectos.";
                    } else {
                        errorMessage.innerText = "Error al conectar. Intenta de nuevo.";
                    }
                });
        });
    </script>
</body>
</html>
