<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d9534f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MDA - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        html, body { height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; background-color: #121212; overflow: hidden; }
        .login-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?q=80&w=1600'); background-size: cover; background-position: center; filter: brightness(0.15) grayscale(0.6); z-index: -1; }
        .login-card { background-color: rgba(30, 30, 30, 0.9); border: 1px solid #444; border-radius: 20px; padding: 30px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.6); width: 100%; max-width: 360px; }
        .form-control-lg { border-radius: 12px; background-color: #2b2b2b; border: 1px solid #555; color: #fff; }
        .form-control-lg::placeholder { color: #aaaaaa !important; }
        .btn-mda { background-color: #d9534f; color: white; border-radius: 12px; padding: 12px; font-weight: bold; border: none; }
        .brand-logo { width: 90px; height: 90px; border-radius: 50%; background-color: #1a1a1a; border: 3px solid #d9534f; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; font-weight: bold; color: white; }
    </style>
</head>
<body>
    <div class="login-bg"></div>
    <div class="login-card text-center">
        <div class="brand-logo">MDA</div>
        <h4 class="text-white mb-1">Marihuaneros del Asfalto</h4>
        <p class="text-white-50 small mb-4">Membresía Digital MG</p>
        <form id="formLogin">
            <input type="email" id="email" class="form-control form-control-lg mb-3" placeholder="Correo electrónico" required>
            <input type="password" id="pass" class="form-control form-control-lg mb-4" placeholder="Contraseña" required>
            <button type="submit" class="btn btn-mda w-100 fw-bold" id="btnLogin">ENTRAR</button>
        </form>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
